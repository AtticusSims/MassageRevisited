<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>McLuhan Analysis — Review</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <!-- Header -->
  <header>
    <h1>The Medium is the Massage — Review</h1>
    <div class="header-center">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">&larr;</button>
      <select id="spreadSelect" onchange="loadSpread(this.value)"></select>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">&rarr;</button>
      <span class="spread-label" id="spreadLabel">spread_001</span>
      <span class="book-pages-label" id="bookPagesLabel"></span>
    </div>
    <div class="header-right">
      <span class="review-stat approved" id="statApproved">0 ✓</span>
      <span class="review-stat flagged" id="statFlagged">0 ⚑</span>
      <span class="review-stat pending" id="statPending">0 pending</span>
      <div class="progress-bar" style="margin-top:4px">
        <div class="fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>
  </header>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab active" data-tab="analysis" onclick="switchTab('analysis')">Analysis</button>
    <button class="tab" data-tab="visual" onclick="switchTab('visual')">Visual Analysis</button>
    <button class="tab" data-tab="planning" onclick="switchTab('planning')">Planning</button>
    <div class="tab-spacer"></div>
    <button class="overview-btn" onclick="showOverview()">Overview</button>
    <button class="export-btn" onclick="exportRevisionPrompt()">Export</button>
    <div class="review-controls" id="reviewControls">
      <button class="review-btn approve" id="btnApprove" onclick="setReview('approved')">✓ Approve</button>
      <button class="review-btn flag" id="btnFlag" onclick="setReview('flagged')">⚑ Flag</button>
      <button class="review-btn reset" id="btnReset" onclick="setReview('pending')">Reset</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main-panels">
    <!-- Left: Image with zoom -->
    <div class="image-panel" id="imagePanel">
      <div class="image-wrapper" id="imageWrapper">
        <img id="spreadImage" src="" alt="Spread image" draggable="false">
      </div>
      <div class="zoom-controls">
        <button onclick="zoomIn()" title="Zoom in (+)">+</button>
        <button onclick="zoomReset()" title="Reset zoom (0)">1:1</button>
        <button onclick="zoomOut()" title="Zoom out (-)">−</button>
        <span class="zoom-level" id="zoomLevel">100%</span>
      </div>
    </div>

    <!-- Right: Content (tabs) -->
    <div class="analysis-panel" id="analysisPanel">
      <!-- Analysis tab -->
      <div id="tabAnalysis" class="tab-content active">
        <div class="placeholder" id="analysisPlaceholder">Select a spread to view analysis</div>
        <div id="analysisContent" style="display:none;"></div>
      </div>
      <!-- Visual Analysis tab -->
      <div id="tabVisual" class="tab-content" style="display:none;">
        <div id="visualContent">
          <div class="placeholder">Loading visual analysis data...</div>
        </div>
      </div>
      <!-- Planning tab -->
      <div id="tabPlanning" class="tab-content" style="display:none;">
        <div id="planningContent">
          <div class="placeholder">Loading planning data...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Overview Modal -->
  <div class="modal-overlay" id="overviewModal" style="display:none;" onclick="if(event.target===this)closeOverview()">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Content Plan Overview</h2>
        <button class="modal-close" onclick="closeOverview()">&times;</button>
      </div>
      <div class="modal-body" id="overviewBody">
        <div class="placeholder">Loading overview data...</div>
      </div>
    </div>
  </div>
</div>

<script>
// ========== State ==========
let NAV_ITEMS = [];
let currentIndex = 0;
let currentSpreadData = null;
let currentReviewStatus = 'pending';

// ========== Zoom State ==========
let zoomScale = 1;
let isPanning = false;
let panStart = { x: 0, y: 0 };
let panOffset = { x: 0, y: 0 };

const ZOOM_MIN = 0.5;
const ZOOM_MAX = 5;
const ZOOM_STEP = 0.25;

const REVIEW_KEY = 'mcluhan_review';

// ========== Init ==========
async function init() {
  try {
    const resp = await fetch('data/index.json');
    const index = await resp.json();
    NAV_ITEMS = index.spreads;
    populateNav();
    updateReviewStats();
    loadSpread(NAV_ITEMS[0].id);
  } catch (e) {
    console.error('Failed to load index:', e);
    document.getElementById('analysisPlaceholder').textContent = 'Failed to load data. Make sure data/index.json exists.';
  }
}

function populateNav() {
  const sel = document.getElementById('spreadSelect');
  sel.innerHTML = '';
  for (let i = 0; i < NAV_ITEMS.length; i++) {
    const item = NAV_ITEMS[i];
    const opt = document.createElement('option');
    opt.value = item.id;
    opt.dataset.analyzed = String(item.analyzed);
    const review = getReviewStatus(item.id);
    let label = `${item.id} (p${item.pdf_page})`;
    if (item.book_pages && item.book_pages.length) label += ` [${item.book_pages.join('-')}]`;
    if (review === 'approved') label += ' ✓';
    else if (review === 'flagged') label += ' ⚑';
    else if (!item.analyzed) label += ' ●';
    opt.textContent = label;
    if (i === 0) opt.selected = true;
    sel.appendChild(opt);
  }
}

// ========== Navigation ==========
function navigate(delta) {
  const newIndex = currentIndex + delta;
  if (newIndex >= 0 && newIndex < NAV_ITEMS.length) {
    currentIndex = newIndex;
    document.getElementById('spreadSelect').selectedIndex = currentIndex;
    loadSpread(NAV_ITEMS[currentIndex].id);
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  if (tab === 'analysis') {
    document.getElementById('tabAnalysis').style.display = 'block';
  } else if (tab === 'visual') {
    document.getElementById('tabVisual').style.display = 'block';
    if (currentSpreadData) renderVisual(currentSpreadData);
  } else if (tab === 'planning') {
    document.getElementById('tabPlanning').style.display = 'block';
    if (currentSpreadData) renderPlanning(currentSpreadData);
  }
}

async function loadSpread(spreadId) {
  currentIndex = NAV_ITEMS.findIndex(n => n.id === spreadId);
  const item = NAV_ITEMS[currentIndex];

  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === NAV_ITEMS.length - 1;
  document.getElementById('spreadSelect').value = spreadId;
  document.getElementById('spreadLabel').textContent = spreadId;
  const bp = item.book_pages;
  document.getElementById('bookPagesLabel').textContent =
    bp && bp.length ? `Book pages ${bp.join('\u2013')}` : '';

  // Load image
  document.getElementById('spreadImage').src = `images/${spreadId}.jpg`;
  zoomReset();

  // Load spread data (analysis + OCR + visual merged)
  try {
    const resp = await fetch(`data/${spreadId}.json`);
    if (resp.ok) {
      currentSpreadData = await resp.json();
      if (currentSpreadData.analysis) {
        renderAnalysis(currentSpreadData.analysis);
      } else {
        showPlaceholder('No analysis data found');
      }
      // Always update visual tab content (even if hidden)
      renderVisual(currentSpreadData);
      renderPlanning(currentSpreadData);
    } else {
      currentSpreadData = null;
      showPlaceholder(item.analyzed ? 'Data file not found' : 'Not yet analyzed');
      document.getElementById('visualContent').innerHTML =
        '<div class="placeholder">Not yet analyzed</div>';
      document.getElementById('planningContent').innerHTML =
        '<div class="placeholder">Not yet analyzed</div>';
    }
  } catch (e) {
    currentSpreadData = null;
    showPlaceholder('Error loading data');
    document.getElementById('visualContent').innerHTML =
      '<div class="placeholder">Error loading data</div>';
    document.getElementById('planningContent').innerHTML =
      '<div class="placeholder">Error loading data</div>';
  }

  // Load review status
  currentReviewStatus = getReviewStatus(spreadId);
  updateReviewUI(currentReviewStatus);
}

// ========== Review (localStorage) ==========
function getReviewData() {
  try {
    return JSON.parse(localStorage.getItem(REVIEW_KEY) || '{}');
  } catch { return {}; }
}

function getReviewStatus(spreadId) {
  const data = getReviewData();
  return (data[spreadId] && data[spreadId].status) || 'pending';
}

function setReview(status) {
  const spreadId = NAV_ITEMS[currentIndex].id;
  const data = getReviewData();
  data[spreadId] = { status };
  localStorage.setItem(REVIEW_KEY, JSON.stringify(data));
  currentReviewStatus = status;
  updateReviewUI(status);
  updateNavOption(currentIndex, status);
  updateReviewStats();
}

function updateReviewUI(status) {
  document.getElementById('btnApprove').classList.toggle('active', status === 'approved');
  document.getElementById('btnFlag').classList.toggle('active', status === 'flagged');
}

function updateNavOption(index, status) {
  const opt = document.getElementById('spreadSelect').options[index];
  if (!opt) return;
  let label = opt.textContent.replace(/ [✓⚑●]$/, '');
  if (status === 'approved') label += ' ✓';
  else if (status === 'flagged') label += ' ⚑';
  opt.textContent = label;
}

function updateReviewStats() {
  const data = getReviewData();
  let approved = 0, flagged = 0;
  const analyzed = NAV_ITEMS.filter(n => n.analyzed).length;
  for (const item of NAV_ITEMS) {
    const s = (data[item.id] && data[item.id].status) || 'pending';
    if (s === 'approved') approved++;
    if (s === 'flagged') flagged++;
  }
  const pending = analyzed - approved - flagged;
  document.getElementById('statApproved').textContent = `${approved} ✓`;
  document.getElementById('statFlagged').textContent = `${flagged} ⚑`;
  document.getElementById('statPending').textContent = `${Math.max(0, pending)} pending`;
  document.getElementById('progressFill').style.width =
    `${NAV_ITEMS.length > 0 ? (analyzed / NAV_ITEMS.length * 100).toFixed(1) : 0}%`;
}

// ========== Visual Analysis Rendering ==========
function renderVisual(data) {
  const el = document.getElementById('visualContent');

  if (!data || (!data.visual && !data.ocr)) {
    el.innerHTML = '<div class="placeholder">No visual analysis data available for this spread</div>';
    return;
  }

  let html = '';

  // Image Description
  if (data.visual && data.visual.image_description) {
    html += `<div class="section">
      <div class="section-header">Image Description</div>
      <div class="vlm-meta">
        <span class="tag vlm-model">${esc(data.visual.model || 'qwen3-vl')}</span>
        ${data.visual.image_description_time ? `<span class="vlm-time">${data.visual.image_description_time}s</span>` : ''}
      </div>
      <div class="visual-text md-content">${renderMarkdown(data.visual.image_description)}</div>
    </div>`;
  }

  // Layout Analysis
  if (data.visual && data.visual.layout_analysis) {
    html += `<div class="section">
      <div class="section-header">Layout Analysis</div>
      <div class="vlm-meta">
        <span class="tag vlm-model">${esc(data.visual.model || 'qwen3-vl')}</span>
        ${data.visual.layout_analysis_time ? `<span class="vlm-time">${data.visual.layout_analysis_time}s</span>` : ''}
      </div>
      <div class="visual-text md-content">${renderMarkdown(data.visual.layout_analysis)}</div>
    </div>`;
  }

  // Collapsible OCR
  if (data.ocr) {
    html += `<div class="section">
      <div class="section-header collapsible-header" onclick="toggleCollapsible(this)">
        <span>OCR Extraction (Qwen3-VL)</span>
        <span class="collapse-arrow">▸</span>
      </div>
      <div class="collapsible-body" style="display:none;">`;

    if (data.ocr.ocr_raw) {
      html += `<div class="ocr-subsection">
        <div class="ocr-subsection-header">Raw OCR
          <span class="vlm-time">${data.ocr.ocr_raw_time || '?'}s · ${data.ocr.ocr_raw.length} chars</span>
        </div>
        <pre class="ocr-text">${esc(data.ocr.ocr_raw) || '<em>empty</em>'}</pre>
      </div>`;
    }

    if (data.ocr.ocr_structured) {
      html += `<div class="ocr-subsection">
        <div class="ocr-subsection-header">Structured OCR
          <span class="vlm-time">${data.ocr.ocr_structured_time || '?'}s</span>
        </div>
        <pre class="ocr-text">${esc(data.ocr.ocr_structured) || '<em>empty</em>'}</pre>
      </div>`;
    }

    html += `</div></div>`;
  }

  if (!html) {
    html = '<div class="placeholder">No visual analysis data available</div>';
  }

  el.innerHTML = html;
}

function toggleCollapsible(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.collapse-arrow');
  if (body.style.display === 'none') {
    body.style.display = 'block';
    arrow.textContent = '\u25BE';
  } else {
    body.style.display = 'none';
    arrow.textContent = '\u25B8';
  }
}

// ========== Planning View Rendering ==========
function renderPlanning(data) {
  const el = document.getElementById('planningContent');

  if (!data || !data.content_plan) {
    el.innerHTML = '<div class="placeholder">No content plan data available for this spread</div>';
    return;
  }

  const plan = data.content_plan;
  const cp = plan.contemporary_plan || {};
  const os = plan.original_summary || {};
  const mapping = cp.mapping || {};
  const feedback = plan.reviewer_feedback || {};

  let html = '';

  // Movement badge
  html += `<div class="plan-movement">
    <span class="tag movement-badge">${fmtEnum(plan.movement || '')}</span>
  </div>`;

  // Theme & Argument
  html += `<div class="section plan-section">
    <div class="section-header">Theme & Argument</div>
    <div class="plan-theme">${esc(cp.theme || '')}</div>
    <div class="plan-argument">${esc(cp.argument || '')}</div>
  </div>`;

  // Text Plan
  if (cp.text) {
    html += `<div class="section plan-section">
      <div class="section-header">Text</div>
      <div class="field"><span class="field-label">Approach</span>
        <span class="tag text-approach">${fmtEnum(cp.text.approach || '')}</span></div>`;
    if (cp.text.description) {
      html += `<div class="field"><span class="field-label">Description</span>
        <div class="field-value">${esc(cp.text.description)}</div></div>`;
    }
    if (cp.text.voice_notes) {
      html += `<div class="field"><span class="field-label">Voice Notes</span>
        <div class="field-value voice-notes">${esc(cp.text.voice_notes)}</div></div>`;
    }
    html += `</div>`;
  }

  // Image Plan
  if (cp.image) {
    html += `<div class="section plan-section">
      <div class="section-header">Image</div>
      <div class="field"><span class="field-label">Approach</span>
        <span class="tag image-approach">${fmtEnum(cp.image.approach || '')}</span></div>`;
    if (cp.image.subject) {
      html += `<div class="field"><span class="field-label">Subject</span>
        <div class="field-value">${esc(cp.image.subject)}</div></div>`;
    }
    if (cp.image.mood) {
      html += `<div class="field"><span class="field-label">Mood</span>
        <span class="tag mood">${fmtEnum(cp.image.mood)}</span></div>`;
    }
    if (cp.image.image_text_relationship) {
      html += `<div class="field"><span class="field-label">Image-Text Relationship</span>
        <span class="tag">${fmtEnum(cp.image.image_text_relationship)}</span></div>`;
    }
    html += `</div>`;
  }

  // Rhetoric Plan
  if (cp.rhetoric) {
    html += `<div class="section plan-section rhetoric">
      <div class="section-header">Rhetoric</div>
      <div class="field"><span class="field-label">Strategy</span>
        <span class="tag strategy-primary">${fmtEnum(cp.rhetoric.strategy || '')}</span></div>`;
    if (cp.rhetoric.design_enacts) {
      html += `<div class="field"><span class="field-label">Design Enacts</span>
        <div class="field-value" style="color:#e8c878;">${esc(cp.rhetoric.design_enacts)}</div></div>`;
    }
    html += `</div>`;
  }

  // Mapping
  html += `<div class="section plan-section">
    <div class="section-header">Mapping to Original</div>
    <div class="field"><span class="field-label">Relationship</span>
      <span class="tag relationship">${fmtEnum(mapping.relationship_to_original || '')}</span></div>`;

  if (mapping.convergences && mapping.convergences.length) {
    html += `<div class="field"><span class="field-label">Convergences</span>
      <div>${mapping.convergences.map(c => `<span class="tag convergence">${fmtEnum(c)}</span>`).join('')}</div></div>`;
  }

  if (mapping.thinkers && mapping.thinkers.length) {
    html += `<div class="field"><span class="field-label">Thinkers</span>
      <div>${mapping.thinkers.map(t => `<span class="tag thinker">${esc(t)}</span>`).join('')}</div></div>`;
  }

  if (mapping.quotations && mapping.quotations.length) {
    html += `<div class="field"><span class="field-label">Quotations</span>`;
    for (const q of mapping.quotations) {
      html += `<div class="card">
        <div class="quote-text">\u201C${esc(q.text)}\u201D</div>
        <div class="card-field">\u2014 ${esc(q.thinker)}${q.source ? `, <em>${esc(q.source)}</em>` : ''}</div>
      </div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;

  // Paper Trace
  if (plan.paper_trace) {
    html += `<div class="section plan-section paper-trace">
      <div class="section-header">Paper Trace</div>
      <div class="field"><span class="field-label">Citation</span>
        <div class="field-value">${esc(plan.paper_trace.citation || '')}</div></div>`;
    if (plan.paper_trace.convergence_tag) {
      html += `<div class="field"><span class="field-label">Convergence Tag</span>
        <div class="field-value">${esc(plan.paper_trace.convergence_tag)}</div></div>`;
    }
    html += `</div>`;
  }

  // Dependencies
  if (cp.dependencies) {
    html += `<div class="section plan-section">
      <div class="section-header">Dependencies</div>
      <div class="field-value">${esc(cp.dependencies)}</div>
    </div>`;
  }

  // Original Summary (collapsible, default expanded)
  // Pull richer data from the analysis if available
  const analysis = data.analysis || {};
  const origText = analysis.text || {};
  const origRhetoric = analysis.rhetoric || {};
  const origDesign = analysis.design || {};

  html += `<div class="section plan-section">
    <div class="section-header collapsible-header" onclick="toggleCollapsible(this)">
      <span>Original Analysis Summary</span>
      <span class="collapse-arrow">\u25BE</span>
    </div>
    <div class="collapsible-body">
      <div class="field"><span class="field-label">Spread Type</span>
        <span class="tag">${fmtEnum(os.spread_type || analysis.spread_type || '')}</span></div>
      <div class="field"><span class="field-label">Section</span>
        <span class="tag">${fmtEnum(os.section || analysis.section || '')}</span></div>
      <div class="field"><span class="field-label">Original Themes</span>
        <div>${(os.original_themes||[]).map(t => `<span class="tag theme">${fmtEnum(t)}</span>`).join('') || '<span style="color:var(--text-muted);">None identified</span>'}</div></div>
      <div class="field"><span class="field-label">Strategy</span>
        <span class="tag">${fmtEnum(os.rhetorical_strategy || '')}</span></div>`;

  // Show the actual argument from analysis
  if (origRhetoric.argument) {
    html += `<div class="field"><span class="field-label">Original Argument</span>
      <div class="field-value" style="color:#fff;font-weight:500;">${esc(origRhetoric.argument)}</div></div>`;
  }

  // Show design-enacts info
  if (os.design_enacts_argument) {
    html += `<div class="field"><span class="field-label">Design Enacts Argument</span>
      <span class="badge-yes">YES</span>
      ${os.design_argument_description ? `<div class="field-value" style="margin-top:4px;font-size:12px;color:#e8c878;">${esc(os.design_argument_description)}</div>` : ''}
    </div>`;
  }

  // Show display/body text from original
  if (origText.display_text) {
    html += `<div class="field"><span class="field-label">Display Text</span>
      <div class="field-value" style="font-size:16px;font-weight:700;color:#fff;">${esc(origText.display_text)}</div></div>`;
  }
  if (origText.body_text) {
    html += `<div class="field"><span class="field-label">Body Text</span>
      <div class="field-value body-text" style="font-size:12px;max-height:120px;overflow-y:auto;">${esc(origText.body_text)}</div></div>`;
  }

  // Show text_excerpt from content plan if available
  if (os.text_excerpt) {
    html += `<div class="field"><span class="field-label">Text Excerpt</span>
      <div class="field-value" style="font-size:12px;max-height:100px;overflow-y:auto;">${esc(os.text_excerpt)}</div></div>`;
  }

  html += `</div></div>`;

  // Reviewer Feedback
  html += `<div class="section plan-section feedback-section">
    <div class="section-header">Feedback</div>
    <div class="feedback-input">
      <textarea id="feedbackNote" placeholder="Add feedback note..." rows="2"></textarea>
      <button class="feedback-add-btn" onclick="addFeedbackNote()">Add Note</button>
    </div>
    <div id="feedbackNotes"></div>
  </div>`;

  el.innerHTML = html;

  // Load and render existing feedback notes
  renderFeedbackNotes();
}

// ========== Feedback (localStorage) ==========
const FEEDBACK_KEY = 'mcluhan_feedback';

function getFeedbackData() {
  try {
    return JSON.parse(localStorage.getItem(FEEDBACK_KEY) || '{}');
  } catch { return {}; }
}

function addFeedbackNote() {
  const textarea = document.getElementById('feedbackNote');
  const note = textarea.value.trim();
  if (!note) return;

  const spreadId = NAV_ITEMS[currentIndex].id;
  const data = getFeedbackData();
  if (!data[spreadId]) data[spreadId] = [];
  data[spreadId].push({
    text: note,
    timestamp: new Date().toISOString()
  });
  localStorage.setItem(FEEDBACK_KEY, JSON.stringify(data));
  textarea.value = '';
  renderFeedbackNotes();
}

function deleteFeedbackNote(index) {
  const spreadId = NAV_ITEMS[currentIndex].id;
  const data = getFeedbackData();
  if (data[spreadId]) {
    data[spreadId].splice(index, 1);
    if (data[spreadId].length === 0) delete data[spreadId];
    localStorage.setItem(FEEDBACK_KEY, JSON.stringify(data));
  }
  renderFeedbackNotes();
}

function renderFeedbackNotes() {
  const el = document.getElementById('feedbackNotes');
  if (!el) return;
  const spreadId = NAV_ITEMS[currentIndex].id;
  const data = getFeedbackData();
  const notes = data[spreadId] || [];

  if (notes.length === 0) {
    el.innerHTML = '<div class="no-notes">No feedback notes yet</div>';
    return;
  }

  let html = '';
  for (let i = 0; i < notes.length; i++) {
    const n = notes[i];
    const date = new Date(n.timestamp).toLocaleDateString('en-US', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    html += `<div class="feedback-note">
      <div class="feedback-note-text">${esc(n.text)}</div>
      <div class="feedback-note-meta">
        <span class="feedback-date">${date}</span>
        <button class="feedback-delete" onclick="deleteFeedbackNote(${i})">&times;</button>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

// ========== Overview Modal ==========
let overviewData = null;

async function showOverview() {
  const modal = document.getElementById('overviewModal');
  modal.style.display = 'flex';

  if (!overviewData) {
    try {
      const resp = await fetch('data/meta.json');
      if (resp.ok) {
        overviewData = await resp.json();
      }
    } catch (e) {
      console.error('Failed to load meta.json:', e);
    }
  }

  renderOverview();
}

function closeOverview() {
  document.getElementById('overviewModal').style.display = 'none';
}

function renderOverview() {
  const el = document.getElementById('overviewBody');

  if (!overviewData || !overviewData.meta) {
    el.innerHTML = '<div class="placeholder">No overview data available. Run generate_content_plan.py first.</div>';
    return;
  }

  const meta = overviewData.meta;
  let html = '';

  // Version info
  html += `<div class="overview-info">
    <span class="tag">Plan v${overviewData.version || '?'}</span>
    <span class="tag">Schema v${overviewData.schema_version || '?'}</span>
    <span class="overview-date">Generated: ${overviewData.generated ? new Date(overviewData.generated).toLocaleDateString() : '?'}</span>
  </div>`;

  // Movement Plan (dict keyed by movement id)
  if (meta.movement_plan) {
    html += `<div class="section overview-section">
      <div class="section-header">Movement Plan</div>`;
    const mpEntries = typeof meta.movement_plan === 'object' && !Array.isArray(meta.movement_plan)
      ? Object.entries(meta.movement_plan)
      : (Array.isArray(meta.movement_plan) ? meta.movement_plan.map(m => [m.id || '', m]) : []);
    for (const [movId, mov] of mpEntries) {
      const title = mov.title || fmtEnum(movId);
      const range = mov.spread_range || '?';
      const desc = mov.description || mov.arc_description || '';
      const pageCount = mov.page_count ? `(${mov.page_count} spreads)` : '';
      html += `<div class="overview-movement">
        <div class="overview-movement-header">
          <span class="tag movement-badge">${fmtEnum(movId)}</span>
          <span class="overview-movement-title">${esc(title)}</span>
          <span class="overview-spread-range">${esc(range)} ${esc(pageCount)}</span>
        </div>
        <div class="overview-movement-desc">${esc(desc)}</div>
      </div>`;
    }
    html += `</div>`;
  }

  // Convergence Map
  if (meta.convergence_map && meta.convergence_map.convergences) {
    html += `<div class="section overview-section">
      <div class="section-header">Convergences (${meta.convergence_map.convergences.length})</div>`;
    for (const c of meta.convergence_map.convergences) {
      const name = c.name || fmtEnum(c.id || '');
      const appearances = c.appearances || [];
      html += `<div class="overview-convergence">
        <div class="convergence-header">
          <span class="tag convergence">${esc(name)}</span>
          <span class="convergence-count">${appearances.length} appearances</span>
        </div>`;
      if (appearances.length) {
        html += `<div class="convergence-appearances">`;
        for (const a of appearances) {
          html += `<div class="convergence-appearance">
            <span class="tag movement-badge" style="font-size:10px;">${fmtEnum(a.movement || '')}</span>
            <a href="#" onclick="closeOverview();loadSpread('${a.spread_id}');return false;" class="convergence-spread-link">${a.spread_id}</a>
            <span class="convergence-intensity tag">${fmtEnum(a.intensity || '')}</span>
            <span class="convergence-manifestation">${esc(a.manifestation || '')}</span>
          </div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  // Rhythm Plan
  if (meta.rhythm_plan) {
    html += `<div class="section overview-section">
      <div class="section-header">Rhythm Plan</div>`;
    if (meta.rhythm_plan.description) {
      html += `<div class="field-value" style="margin-bottom:12px;">${esc(meta.rhythm_plan.description)}</div>`;
    }
    if (meta.rhythm_plan.segments && meta.rhythm_plan.segments.length) {
      html += `<div class="rhythm-segments">`;
      for (const seg of meta.rhythm_plan.segments) {
        html += `<div class="rhythm-segment">
          <div class="rhythm-segment-range">${esc(seg.spread_range || '')}</div>
          <div class="rhythm-segment-char">${esc(seg.character || '')}</div>
          ${seg.design_pattern ? `<div class="rhythm-segment-design">${esc(seg.design_pattern)}</div>` : ''}
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  // Status Dashboard
  html += `<div class="section overview-section">
    <div class="section-header">Review Status Dashboard</div>`;
  const reviewData = getReviewData();
  const feedbackData = getFeedbackData();
  let approved = 0, flagged = 0, pending = 0, withNotes = 0;
  for (const item of NAV_ITEMS) {
    const s = (reviewData[item.id] && reviewData[item.id].status) || 'pending';
    if (s === 'approved') approved++;
    else if (s === 'flagged') flagged++;
    else pending++;
    if (feedbackData[item.id] && feedbackData[item.id].length) withNotes++;
  }
  html += `<div class="dashboard-stats">
    <div class="dash-stat"><span class="dash-num approved">${approved}</span><span class="dash-label">Approved</span></div>
    <div class="dash-stat"><span class="dash-num flagged">${flagged}</span><span class="dash-label">Flagged</span></div>
    <div class="dash-stat"><span class="dash-num pending">${pending}</span><span class="dash-label">Pending</span></div>
    <div class="dash-stat"><span class="dash-num notes">${withNotes}</span><span class="dash-label">With Notes</span></div>
  </div>`;

  // Flagged spreads list
  const flaggedSpreads = NAV_ITEMS.filter(n => (reviewData[n.id] && reviewData[n.id].status) === 'flagged');
  if (flaggedSpreads.length) {
    html += `<div class="flagged-list"><strong>Flagged spreads:</strong> ${flaggedSpreads.map(s => `<a href="#" onclick="closeOverview();loadSpread('${s.id}');return false;">${s.id}</a>`).join(', ')}</div>`;
  }
  html += `</div>`;

  el.innerHTML = html;
}

// ========== Export Revision Prompt ==========
function exportRevisionPrompt() {
  const reviewData = getReviewData();
  const feedbackData = getFeedbackData();

  let prompt = '# Content Plan Revision Prompt\n\n';
  prompt += `Generated: ${new Date().toISOString()}\n\n`;

  // Summary
  let approved = 0, flagged = 0;
  for (const item of NAV_ITEMS) {
    const s = (reviewData[item.id] && reviewData[item.id].status) || 'pending';
    if (s === 'approved') approved++;
    if (s === 'flagged') flagged++;
  }
  prompt += `## Summary\n- Approved: ${approved}\n- Flagged: ${flagged}\n- Pending: ${NAV_ITEMS.length - approved - flagged}\n\n`;

  // Flagged spreads with feedback
  const flaggedSpreads = NAV_ITEMS.filter(n => (reviewData[n.id] && reviewData[n.id].status) === 'flagged');
  if (flaggedSpreads.length) {
    prompt += `## Flagged Spreads\n\n`;
    for (const s of flaggedSpreads) {
      prompt += `### ${s.id}\n`;
      const notes = feedbackData[s.id] || [];
      if (notes.length) {
        for (const n of notes) {
          prompt += `- ${n.text}\n`;
        }
      } else {
        prompt += `- (no notes)\n`;
      }
      prompt += '\n';
    }
  }

  // All spreads with feedback notes (including non-flagged)
  const withNotes = NAV_ITEMS.filter(n => feedbackData[n.id] && feedbackData[n.id].length > 0 && (reviewData[n.id] && reviewData[n.id].status) !== 'flagged');
  if (withNotes.length) {
    prompt += `## Other Spreads with Notes\n\n`;
    for (const s of withNotes) {
      prompt += `### ${s.id} (${(reviewData[s.id] && reviewData[s.id].status) || 'pending'})\n`;
      const notes = feedbackData[s.id] || [];
      for (const n of notes) {
        prompt += `- ${n.text}\n`;
      }
      prompt += '\n';
    }
  }

  // Copy to clipboard
  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.querySelector('.export-btn');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = orig; }, 2000);
  }).catch(() => {
    // Fallback: open in new window
    const w = window.open('', '_blank');
    w.document.write('<pre>' + prompt.replace(/</g, '&lt;') + '</pre>');
  });
}

// ========== Analysis Rendering ==========
function showPlaceholder(msg) {
  document.getElementById('analysisPlaceholder').textContent = msg;
  document.getElementById('analysisPlaceholder').style.display = 'flex';
  document.getElementById('analysisContent').style.display = 'none';
}

// Format enum values: replace underscores with spaces, capitalize first letter of each word
function fmtEnum(str) {
  if (!str) return '';
  return str.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// Render a confidence badge (high/moderate/low)
function renderConfidence(level) {
  if (!level) return '';
  return `<span class="tag confidence-${level}">${fmtEnum(level)} confidence</span>`;
}

function renderAnalysis(s) {

    <div class="field"><span class="field-label">Movement Mapping</span>

  html += `<div class="themes-note" style="margin-top:8px;padding:8px;background:rgba(255,255,255,0.03);border-radius:4px;font-size:11px;color:var(--text-muted);">
    <em>Note: Theme analysis was auto-generated from VLM data. Contemporary domains and movement mapping are populated in the Content Plan (Planning tab).</em>
  </div>
  </div>`;

  // Progression
  html += `<div class="section"><div class="section-header">Progression${s.progression.confidence ? ' ' + renderConfidence(s.progression.confidence) : ''}</div>
    <div class="field">
      <span class="tag pace">${fmtEnum(s.progression.pace_shift||'')}</span>
      <span class="tag function">${fmtEnum(s.progression.thematic_function||'')}</span>
    </div>
    <div class="field"><span class="field-label">Relationship to Previous</span>
      <div class="field-value">${esc(s.progression.relationship_to_previous)}</div></div>
    <div class="field"><span class="field-label">Relationship to Next</span>
      <div class="field-value">${esc(s.progression.relationship_to_next)}</div></div>
  </div>`;

  // Notes
  if (s.notes) {
    html += `<div class="section"><div class="section-header">Notes</div>
      <div class="notes-box">${esc(s.notes)}</div>
    </div>`;
  }

  el.innerHTML = html;
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Lightweight markdown→HTML for VLM output (headings, bold, italic, lists, line breaks)
function renderMarkdown(str) {
  if (!str) return '';
  // First HTML-escape
  let html = esc(str);
  // Headings: #### > ### > ## (process longest first)
  html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
  // Bold: **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic: *text* (but not inside bold)
  html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
  // Bullet lists: lines starting with - (with optional leading spaces)
  html = html.replace(/^(\s*)- (.+)$/gm, function(match, indent, content) {
    return `<li>${content}</li>`;
  });
  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li>.*?<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Numbered lists: lines starting with 1. 2. etc
  html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
  // Convert remaining newlines to <br> (but not after block elements)
  html = html.replace(/\n(?!<[hul\/])/g, '<br>\n');
  // Clean up double <br> after block elements
  html = html.replace(/(<\/h[234]>)<br>/g, '$1');
  html = html.replace(/(<\/ul>)<br>/g, '$1');
  return html;
}

// ========== Image Zoom ==========
function zoomIn() {
  zoomScale = Math.min(ZOOM_MAX, zoomScale + ZOOM_STEP);
  applyZoom();
}

function zoomOut() {
  zoomScale = Math.max(ZOOM_MIN, zoomScale - ZOOM_STEP);
  applyZoom();
}

function zoomReset() {
  zoomScale = 1;
  panOffset = { x: 0, y: 0 };
  applyZoom();
}

function applyZoom() {
  const img = document.getElementById('spreadImage');
  img.style.transform = `translate(${panOffset.x}px, ${panOffset.y}px) scale(${zoomScale})`;
  document.getElementById('zoomLevel').textContent = `${Math.round(zoomScale * 100)}%`;
  // Show/hide cursor style based on zoom level
  const wrapper = document.getElementById('imageWrapper');
  wrapper.style.cursor = zoomScale > 1 ? 'grab' : 'default';
}

// Mouse wheel zoom
document.addEventListener('DOMContentLoaded', () => {
  const wrapper = document.getElementById('imageWrapper');

  wrapper.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
    zoomScale = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoomScale + delta));
    // Reset pan if zooming back to 1x
    if (zoomScale <= 1) panOffset = { x: 0, y: 0 };
    applyZoom();
  }, { passive: false });

  // Click to toggle zoom
  wrapper.addEventListener('click', (e) => {
    if (isPanning) return;
    if (zoomScale === 1) {
      zoomScale = 2;
      // Zoom toward click position
      const rect = wrapper.getBoundingClientRect();
      const cx = e.clientX - rect.left - rect.width / 2;
      const cy = e.clientY - rect.top - rect.height / 2;
      panOffset = { x: -cx * 0.5, y: -cy * 0.5 };
    } else {
      zoomScale = 1;
      panOffset = { x: 0, y: 0 };
    }
    applyZoom();
  });

  // Pan/drag when zoomed
  let dragStarted = false;
  wrapper.addEventListener('mousedown', (e) => {
    if (zoomScale <= 1) return;
    isPanning = false;
    dragStarted = true;
    panStart = { x: e.clientX - panOffset.x, y: e.clientY - panOffset.y };
    wrapper.style.cursor = 'grabbing';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragStarted) return;
    isPanning = true;
    panOffset = { x: e.clientX - panStart.x, y: e.clientY - panStart.y };
    applyZoom();
  });

  document.addEventListener('mouseup', () => {
    if (dragStarted) {
      dragStarted = false;
      const wrapper = document.getElementById('imageWrapper');
      wrapper.style.cursor = zoomScale > 1 ? 'grab' : 'default';
      // Reset isPanning after a tick so click handler can check it
      setTimeout(() => { isPanning = false; }, 10);
    }
  });
});

// ========== Keyboard Shortcuts ==========
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft' || e.key === 'a') navigate(-1);
  if (e.key === 'ArrowRight' || e.key === 'd') navigate(1);
  if (e.key === '1') switchTab('analysis');
  if (e.key === '2') switchTab('visual');
  if (e.key === '3') switchTab('planning');
  if (e.key === 'y') setReview('approved');
  if (e.key === 'f') setReview('flagged');
  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
  if (e.key === '0') zoomReset();
  if (e.key === 'Escape') closeOverview();
});

// ========== Start ==========
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
