<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Model is the Massage — Layout Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Bebas+Neue&family=Urbanist:ital,wght@0,100..900;1,100..900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@100..900&family=Sora:wght@100..800&family=Manrope:wght@200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Oswald:wght@200..700&family=Anton&family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    /* ===== Reset & Variables ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a1a;
      --bg-panel: #222;
      --bg-card: #2a2a2a;
      --bg-hover: #333;
      --text: #e0e0e0;
      --text-muted: #999;
      --text-bright: #fff;
      --accent: #e8a838;
      --accent-dim: #b8842a;
      --green: #4caf50;
      --red: #e74c3c;
      --blue: #5b9bd5;
      --purple: #a88beb;
      --border: #444;
      --selected: rgba(232, 168, 56, 0.15);
      --selected-border: #e8a838;
      /* Book fonts */
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-caption: 'Cormorant Garamond', serif;
      --font-graphic: 'Bebas Neue', 'Space Grotesk', sans-serif;
    }
    html, body {
      height: 100%; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px; line-height: 1.5; color: var(--text); background: var(--bg);
    }
    .app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ===== Header ===== */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: #111; border-bottom: 1px solid var(--border);
      flex-shrink: 0; gap: 16px;
    }
    header h1 { font-size: 14px; font-weight: 600; color: var(--accent); white-space: nowrap; }
    .header-center { display: flex; align-items: center; gap: 12px; }
    .header-right { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-muted); }
    .spread-label { font-size: 15px; font-weight: 600; color: var(--text-bright); }
    .movement-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: var(--purple); color: #fff; white-space: nowrap;
    }
    .movement-badge.m1 { background: var(--blue); }
    .movement-badge.m2 { background: #e67e22; }
    .movement-badge.hinge { background: var(--red); }
    .movement-badge.m3 { background: #27ae60; }
    .nav-btn {
      background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
      padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .nav-btn:hover { background: var(--bg-hover); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    #spreadSelect {
      background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
      padding: 4px 8px; border-radius: 4px; font-size: 13px; max-width: 320px;
    }
    .back-link {
      color: var(--text-muted); text-decoration: none; font-size: 12px;
      padding: 4px 8px; border-radius: 4px;
    }
    .back-link:hover { color: var(--accent); background: var(--bg-card); }
    .btn {
      padding: 5px 14px; border-radius: 4px; font-size: 11px; cursor: pointer;
      border: 1px solid var(--border); background: var(--bg-card); color: var(--text);
    }
    .btn:hover { background: var(--bg-hover); }
    .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .btn.primary:hover { background: var(--accent-dim); }
    .btn.export { background: var(--green); color: #fff; border-color: var(--green); }

    /* ===== Progress Bar ===== */
    .progress-bar {
      display: flex; gap: 2px; padding: 6px 16px; background: #111; border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .progress-dot {
      flex: 1; height: 3px; border-radius: 2px; background: var(--bg-card);
      cursor: pointer; transition: all 0.2s;
    }
    .progress-dot.current { background: var(--accent); }
    .progress-dot.has-notes { background: var(--green); }
    .progress-dot.has-draft { background: var(--blue); }
    .progress-dot:hover { background: #555; }

    /* ===== Main Layout ===== */
    .main-content {
      display: flex; flex: 1; overflow: hidden;
    }

    /* ===== Left Panel: View Area ===== */
    .view-panel {
      flex: 7; display: flex; flex-direction: column;
      border-right: 1px solid var(--border); background: #111; min-width: 500px;
    }

    /* View tabs (New Layout / Original Spread) */
    .view-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border);
      background: var(--bg-panel); flex-shrink: 0;
    }
    .view-tab {
      padding: 8px 20px; font-size: 12px; font-weight: 600; cursor: pointer;
      color: var(--text-muted); border-bottom: 2px solid transparent;
      text-transform: uppercase; letter-spacing: 0.5px;
      background: transparent; border-top: none; border-left: none; border-right: none;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); background: var(--bg-hover); }
    .view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .view-tab-spacer { flex: 1; }

    /* Zoom controls */
    .zoom-controls {
      display: flex; align-items: center; gap: 4px; padding: 0 12px;
    }
    .zoom-controls button {
      background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
      width: 28px; height: 28px; border-radius: 4px; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .zoom-controls button:hover { background: var(--bg-hover); border-color: var(--accent-dim); }
    .zoom-level { font-size: 11px; color: var(--text-muted); min-width: 36px; text-align: center; }

    /* Viewport */
    .view-viewport {
      flex: 1; display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative; cursor: default;
    }

    /* Rendered spread viewport */
    #layoutViewport { display: flex; }
    #originalViewport { display: none; }

    .spread-scale-wrapper {
      transform-origin: center center;
    }

    /* Original image container */
    .original-container {
      position: relative;
      transform-origin: center center;
    }
    .original-container img {
      max-width: none; display: block;
      border: 1px solid var(--border);
    }

    /* Image strip for multiple image options */
    .image-strip {
      padding: 8px 12px; border-top: 1px solid var(--border); background: var(--bg-panel);
      display: flex; gap: 8px; align-items: center; flex-shrink: 0;
    }
    .image-strip-label {
      font-size: 10px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.5px; white-space: nowrap;
    }
    .image-strip-thumbs {
      display: flex; gap: 6px; overflow-x: auto;
    }
    .image-thumb {
      width: 80px; height: 50px; border-radius: 3px; overflow: hidden;
      border: 2px solid transparent; cursor: pointer; flex-shrink: 0;
      background: #333; display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .image-thumb:hover { border-color: var(--text-muted); }
    .image-thumb.active { border-color: var(--accent); }
    .image-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .image-thumb .no-img { font-size: 8px; color: var(--text-muted); }

    /* ===== Right Panel: Info & Notes ===== */
    .info-panel {
      flex: 3; display: flex; flex-direction: column; overflow: hidden;
      min-width: 280px; max-width: 400px;
    }
    .info-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
    }
    .info-header h2 { font-size: 14px; color: var(--text-bright); margin-bottom: 4px; }
    .info-scroll {
      flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 12px;
    }

    /* Source badge */
    .source-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600;
    }
    .source-badge.revised {
      background: rgba(232, 168, 56, 0.15); color: var(--accent);
      border: 1px solid rgba(232, 168, 56, 0.3);
    }
    .source-badge.aps-selected {
      background: rgba(91, 155, 213, 0.12); color: var(--blue);
      border: 1px solid rgba(91, 155, 213, 0.3);
    }
    .source-badge.default {
      background: var(--bg-card); color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* Layout info badges */
    .layout-badges {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .layout-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 10px;
      background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border);
    }
    .layout-badge.type { color: var(--blue); border-color: var(--blue); }
    .layout-badge.tone { color: var(--purple); border-color: var(--purple); }
    .layout-badge.color { color: var(--green); border-color: var(--green); }

    /* APS Reviewer Notes */
    .aps-notes {
      border: 1px solid rgba(232, 168, 56, 0.3);
      background: rgba(232, 168, 56, 0.05);
      border-radius: 6px; padding: 10px 12px;
    }
    .aps-notes-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 10px; font-weight: 600; color: var(--text-muted);
      margin-bottom: 6px;
    }
    .aps-badge {
      background: #555; color: #fff; font-size: 9px; font-weight: 700;
      padding: 2px 6px; border-radius: 3px; letter-spacing: 0.5px;
    }
    .aps-notes-body {
      font-size: 11px; color: var(--text-muted); line-height: 1.5;
      white-space: pre-wrap;
    }

    /* Rating display */
    .aps-ratings {
      display: flex; gap: 8px; flex-wrap: wrap; font-size: 11px;
    }
    .aps-rating-item {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 6px; border-radius: 3px; background: var(--bg-card);
    }
    .aps-rating-item .option-letter {
      font-weight: 700; color: var(--text-bright);
    }
    .aps-rating-item .stars {
      color: var(--accent); letter-spacing: 1px;
    }

    /* Text preview in info panel */
    .text-preview-panel {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; padding: 12px;
    }
    .text-preview-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px;
    }
    .text-preview-content {
      font-size: 12px; line-height: 1.6; color: var(--text);
      white-space: pre-wrap; font-family: var(--font-body);
      max-height: 200px; overflow-y: auto;
    }
    .text-preview-content .display-line {
      font-family: var(--font-display); font-weight: 700; font-size: 14px;
      color: var(--text-bright); margin-bottom: 6px;
    }

    /* Section dividers */
    .info-section-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted); margin-top: 4px;
    }

    /* Notes textarea */
    .notes-area {
      padding: 10px 16px; border-top: 1px solid var(--border); background: #111;
      flex-shrink: 0;
    }
    .notes-area textarea {
      width: 100%; background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
      padding: 8px 10px; border-radius: 4px; font-size: 12px; resize: vertical;
      min-height: 60px; max-height: 150px; font-family: inherit; line-height: 1.5;
    }
    .notes-area textarea:focus { outline: none; border-color: var(--accent); }
    .notes-area textarea::placeholder { color: var(--text-muted); }
    .notes-area-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 6px;
    }
    .notes-area-header label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted);
    }

    /* ===== The Book Spread ===== */
    .spread-frame {
      width: 1060px; height: 905px;
      background: #fff; color: #000;
      position: relative; overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      display: flex; flex-shrink: 0;
      transform-origin: center center;
    }
    .spread-frame.tone-dark { background: #0a0a0a; color: #fff; }
    .spread-frame.tone-mixed { background: #f5f5f0; color: #1a1a1a; }
    .spread-frame.tone-high_contrast { background: #000; color: #fff; }
    .spread-frame.tone-balanced { background: #f0f0f0; color: #111; }
    .spread-page {
      width: 50%; height: 100%; position: relative; overflow: hidden;
    }
    .spread-page.left { border-right: 1px solid rgba(0,0,0,0.08); }
    .spread-page.right { border-left: 1px solid rgba(0,0,0,0.08); }

    /* Gutter line */
    .gutter-line {
      position: absolute; top: 0; bottom: 0; left: 50%;
      width: 2px; z-index: 10;
    }
    .gutter-line.visible { background: rgba(0,0,0,0.1); }
    .gutter-line.bridged { background: transparent; border-left: 1px dashed rgba(0,0,0,0.06); }

    /* ===== Layout Type Templates ===== */
    .layout-full_bleed_typography .spread-page { display: flex; align-items: center; justify-content: center; }
    .layout-full_bleed_typography .display-zone {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .layout-full_bleed_typography .body-zone { position: absolute; bottom: 40px; right: 40px; max-width: 45%; text-align: right; }
    .layout-full_bleed_typography .caption-zone { position: absolute; bottom: 20px; right: 40px; max-width: 40%; text-align: right; }
    .layout-full_bleed_image .image-zone {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #888; display: flex; align-items: center; justify-content: center;
    }
    .layout-full_bleed_image .image-zone img { width: 100%; height: 100%; object-fit: cover; }
    .layout-full_bleed_image .text-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 60px 50px; background: linear-gradient(transparent 40%, rgba(0,0,0,0.7));
    }
    .layout-full_bleed_image .text-overlay .display-zone { color: #fff; }
    .layout-full_bleed_image .text-overlay .body-zone { color: rgba(255,255,255,0.9); margin-top: 16px; }
    .layout-full_bleed_image .text-overlay .caption-zone { color: rgba(255,255,255,0.7); margin-top: 12px; }
    .layout-split_asymmetric { display: flex; }
    .layout-split_asymmetric .spread-page.left { display: flex; flex-direction: column; justify-content: center; padding: 50px 40px; }
    .layout-split_asymmetric .spread-page.right { display: flex; align-items: center; justify-content: center; }
    .layout-split_asymmetric .image-zone { width: 100%; height: 100%; background: #888; display: flex; align-items: center; justify-content: center; }
    .layout-split_asymmetric .image-zone img { width: 100%; height: 100%; object-fit: cover; }
    .layout-split_symmetric { display: flex; }
    .layout-split_symmetric .spread-page { display: flex; flex-direction: column; justify-content: center; }
    .layout-split_symmetric .spread-page.left { padding: 50px 40px; }
    .layout-split_symmetric .spread-page.right { display: flex; align-items: center; justify-content: center; }
    .layout-split_symmetric .image-zone { width: 100%; height: 100%; background: #888; display: flex; align-items: center; justify-content: center; }
    .layout-split_symmetric .image-zone img { width: 100%; height: 100%; object-fit: cover; }
    .layout-text_dominant .spread-page.left { display: flex; flex-direction: column; justify-content: center; padding: 50px 40px; }
    .layout-text_dominant .spread-page.right { display: flex; flex-direction: column; justify-content: space-between; padding: 40px; }
    .layout-text_dominant .image-zone { width: 100%; height: 35%; background: #888; border-radius: 2px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .layout-text_dominant .image-zone img { width: 100%; height: 100%; object-fit: cover; }
    .layout-image_dominant .spread-page.left { display: flex; align-items: center; justify-content: center; }
    .layout-image_dominant .spread-page.left .image-zone { width: 100%; height: 100%; background: #888; display: flex; align-items: center; justify-content: center; }
    .layout-image_dominant .spread-page.left .image-zone img { width: 100%; height: 100%; object-fit: cover; }
    .layout-image_dominant .spread-page.right { display: flex; flex-direction: column; justify-content: center; padding: 50px 40px; }
    .layout-text_over_image .image-zone {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #888; display: flex; align-items: center; justify-content: center;
    }
    .layout-text_over_image .image-zone img { width: 100%; height: 100%; object-fit: cover; }
    .layout-text_over_image .text-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 60px; text-align: center;
    }
    .layout-minimal_sparse .spread-page.left { display: flex; align-items: center; justify-content: center; padding: 80px 60px; }
    .layout-minimal_sparse .spread-page.right { display: flex; flex-direction: column; justify-content: flex-end; padding: 80px 60px; }
    .layout-dense_collage .spread-page { position: relative; overflow: hidden; }
    .layout-dense_collage .collage-element { position: absolute; }
    .layout-diagram_with_text .spread-page.left { display: flex; flex-direction: column; justify-content: center; padding: 40px; }
    .layout-diagram_with_text .spread-page.right { display: flex; align-items: center; justify-content: center; padding: 40px; }

    /* ===== Typography in Spread ===== */
    .spread-display-text {
      font-family: var(--font-display); font-weight: 700; line-height: 0.95; letter-spacing: -0.03em;
    }
    .spread-display-text.scale-architectural { font-size: 72px; }
    .spread-display-text.scale-monumental { font-size: 60px; }
    .spread-display-text.scale-monumental-single { font-size: min(70vw, 420px); line-height: 0.85; letter-spacing: -0.02em; }
    .spread-display-text.scale-headline { font-size: 52px; }
    .spread-display-text.scale-large { font-size: 48px; }
    .spread-display-text.scale-subhead { font-size: 36px; }
    .spread-display-text.scale-medium { font-size: 32px; }
    .spread-display-text.scale-body { font-size: 24px; }
    .spread-display-text.scale-small { font-size: 20px; }
    .spread-display-text.scale-caption { font-size: 16px; }
    .spread-body-text {
      font-family: var(--font-body); font-weight: 400; font-size: 14px;
      line-height: 1.65; letter-spacing: 0.01em; overflow: hidden;
    }
    .spread-caption-text {
      font-family: var(--font-caption); font-weight: 400; font-style: italic;
      font-size: 13px; line-height: 1.5; letter-spacing: 0.02em;
    }
    .spread-quotation-text {
      font-family: var(--font-caption); font-weight: 500; font-style: italic;
      font-size: 16px; line-height: 1.5;
    }
    .spread-graphic-text {
      font-family: var(--font-graphic); font-weight: 400;
      text-transform: uppercase; letter-spacing: 0.15em;
    }

    /* Color treatments */
    .color-black_on_white { color: #000; }
    .color-white_on_black { color: #fff; }
    .color-reversed .spread-page.left { background: #000; color: #fff; }
    .color-reversed .spread-page.right { background: #fff; color: #000; }
    .color-mixed { }

    /* Image placeholder */
    .image-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-body); font-size: 11px; color: #999;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: repeating-linear-gradient(45deg, #e8e8e8, #e8e8e8 10px, #f0f0f0 10px, #f0f0f0 20px);
    }
    .tone-dark .image-placeholder {
      background: repeating-linear-gradient(45deg, #222, #222 10px, #2a2a2a 10px, #2a2a2a 20px);
      color: #555;
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      .main-content { flex-direction: column; }
      .view-panel { min-width: 0; flex: 1; border-right: none; border-bottom: 1px solid var(--border); }
      .info-panel { min-width: 0; max-width: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="index.html#workspace" class="back-link">&larr; Analysis</a>
      <h1>&#128214; Layout Review</h1>
    </div>
    <div class="header-center">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">&larr;</button>
      <select id="spreadSelect" onchange="goToSpread(this.value)"></select>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">&rarr;</button>
      <span class="spread-label" id="spreadLabel"></span>
      <span class="movement-badge" id="movementBadge"></span>
    </div>
    <div class="header-right">
      <span id="progressText" style="font-size:11px;color:var(--text-muted)"></span>
      <button class="btn export" onclick="exportReviewNotes()">Export Notes</button>
    </div>
  </header>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Left: View Panel -->
    <div class="view-panel">
      <!-- View Tabs -->
      <div class="view-tabs">
        <button class="view-tab active" data-view="layout" onclick="switchView('layout')">New Layout</button>
        <button class="view-tab" data-view="original" onclick="switchView('original')">Original Spread</button>
        <div class="view-tab-spacer"></div>
        <div class="zoom-controls">
          <button onclick="zoomIn()" title="Zoom in (+)">+</button>
          <button onclick="zoomReset()" title="Reset zoom (0)">1:1</button>
          <button onclick="zoomOut()" title="Zoom out (-)">&#8722;</button>
          <span class="zoom-level" id="zoomLevel">100%</span>
        </div>
      </div>

      <!-- Layout viewport -->
      <div class="view-viewport" id="layoutViewport">
        <div class="spread-scale-wrapper" id="spreadScaleWrapper">
          <div class="spread-frame" id="spreadFrame">
            <div class="gutter-line" id="gutterLine"></div>
            <div class="spread-page left" id="pageLeft"></div>
            <div class="spread-page right" id="pageRight"></div>
          </div>
        </div>
      </div>

      <!-- Original viewport -->
      <div class="view-viewport" id="originalViewport" style="display:none;">
        <div class="original-container" id="originalContainer">
          <img id="originalImage" src="" alt="Original spread" draggable="false" />
        </div>
      </div>

      <!-- Image strip -->
      <div class="image-strip" id="imageStrip" style="display:none;">
        <span class="image-strip-label">Images:</span>
        <div class="image-strip-thumbs" id="imageStripThumbs"></div>
      </div>
    </div>

    <!-- Right: Info & Notes Panel -->
    <div class="info-panel">
      <div class="info-header">
        <h2 id="infoTitle">Spread Info</h2>
        <div id="themeText" style="font-size:12px;color:var(--accent);margin-top:2px;"></div>
      </div>
      <div class="info-scroll" id="infoScroll">
        <!-- Populated dynamically -->
      </div>
      <div class="notes-area">
        <div class="notes-area-header">
          <label>Layout Review Notes</label>
        </div>
        <textarea id="reviewNotes" placeholder="Add layout review notes for this spread..." oninput="saveNote()"></textarea>
      </div>
    </div>

  </div>

  <!-- Progress -->
  <div class="progress-bar" id="progressBar"></div>

</div>

<script>
// ===== State =====
let data = null;
let imageMetadata = null;
let revisedDrafts = null;
let reviewData = null;
let currentIndex = 0;
let currentImageIdx = 0;
let reviewNotes = {};

// Zoom state
let currentView = 'layout'; // 'layout' | 'original'
const ZOOM_MIN = 0.5;
const ZOOM_MAX = 5;
const ZOOM_STEP = 0.25;
let layoutZoom = { scale: 1, pan: { x: 0, y: 0 } };
let originalZoom = { scale: 1, pan: { x: 0, y: 0 } };
let isPanning = false;
let panStart = { x: 0, y: 0 };

// Load saved notes
try {
  const saved = localStorage.getItem('review_notes_v1');
  if (saved) reviewNotes = JSON.parse(saved);
} catch(e) {}

// ===== Load Data =====
async function init() {
  try {
    const resp = await fetch('data/authoring_output.json');
    data = await resp.json();
    try {
      const imgResp = await fetch('data/image_metadata.json');
      if (imgResp.ok) imageMetadata = await imgResp.json();
    } catch(e) {}
    try {
      const draftResp = await fetch('data/revised_drafts.json');
      if (draftResp.ok) revisedDrafts = await draftResp.json();
    } catch(e) {}
    try {
      const revResp = await fetch('data/review_selections.json');
      if (revResp.ok) {
        const revJson = await revResp.json();
        reviewData = revJson.selections || {};
      }
    } catch(e) {}
    buildUI();
    renderSpread(0);
    window.addEventListener('resize', scaleCurrentView);
    setupZoom();
  } catch(e) {
    document.getElementById('infoScroll').innerHTML =
      `<div style="padding:40px;text-align:center;color:var(--red)">Failed to load: ${e.message}</div>`;
  }
}

function buildUI() {
  const sel = document.getElementById('spreadSelect');
  sel.innerHTML = data.spreads.map((s, i) =>
    `<option value="${i}">${s.spread_id} — ${truncate(s.theme || '(no theme)', 40)}</option>`
  ).join('');

  const bar = document.getElementById('progressBar');
  bar.innerHTML = data.spreads.map((s, i) => {
    let cls = '';
    if (revisedDrafts?.[s.spread_id]?.text) cls = 'has-draft';
    else if (reviewNotes[s.spread_id]) cls = 'has-notes';
    return `<div class="progress-dot ${cls}" data-idx="${i}" onclick="goToSpread(${i})" title="${s.spread_id}: ${s.theme || ''}"></div>`;
  }).join('');

  updateProgressText();
}

function updateProgressText() {
  const total = data.spreads.length;
  const withDrafts = data.spreads.filter(s => revisedDrafts?.[s.spread_id]?.text).length;
  const withNotes = Object.keys(reviewNotes).filter(k => reviewNotes[k]).length;
  document.getElementById('progressText').textContent =
    `${currentIndex + 1}/${total} | ${withDrafts} revised | ${withNotes} notes`;
}

// ===== Navigation =====
function navigate(dir) {
  const newIdx = currentIndex + dir;
  if (newIdx >= 0 && newIdx < data.spreads.length) renderSpread(newIdx);
}
function goToSpread(idx) {
  idx = parseInt(idx);
  if (idx >= 0 && idx < data.spreads.length) renderSpread(idx);
}

// ===== View Switching =====
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.view === view)
  );
  const layoutVp = document.getElementById('layoutViewport');
  const origVp = document.getElementById('originalViewport');
  if (view === 'layout') {
    layoutVp.style.display = 'flex';
    origVp.style.display = 'none';
  } else {
    layoutVp.style.display = 'none';
    origVp.style.display = 'flex';
  }
  // Reset zoom on switch
  zoomReset();
  scaleCurrentView();
}

// ===== Zoom =====
function getZoomState() {
  return currentView === 'layout' ? layoutZoom : originalZoom;
}

function zoomIn() {
  const z = getZoomState();
  z.scale = Math.min(ZOOM_MAX, z.scale + ZOOM_STEP);
  applyZoom();
}
function zoomOut() {
  const z = getZoomState();
  z.scale = Math.max(ZOOM_MIN, z.scale - ZOOM_STEP);
  applyZoom();
}
function zoomReset() {
  const z = getZoomState();
  z.scale = 1;
  z.pan = { x: 0, y: 0 };
  applyZoom();
}

function applyZoom() {
  const z = getZoomState();
  document.getElementById('zoomLevel').textContent = `${Math.round(z.scale * 100)}%`;

  if (currentView === 'layout') {
    // For layout view, zoom is combined with fit-to-viewport scaling
    scaleSpread();
  } else {
    // For original view, apply zoom + pan directly
    const container = document.getElementById('originalContainer');
    container.style.transform = `translate(${z.pan.x}px, ${z.pan.y}px) scale(${z.scale})`;
    const vp = document.getElementById('originalViewport');
    vp.style.cursor = z.scale > 1 ? 'grab' : 'default';
  }
}

function setupZoom() {
  // Layout viewport zoom
  const layoutVp = document.getElementById('layoutViewport');
  layoutVp.addEventListener('wheel', (e) => {
    if (currentView !== 'layout') return;
    e.preventDefault();
    const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
    layoutZoom.scale = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, layoutZoom.scale + delta));
    if (layoutZoom.scale <= 1) layoutZoom.pan = { x: 0, y: 0 };
    applyZoom();
  }, { passive: false });

  layoutVp.addEventListener('click', (e) => {
    if (currentView !== 'layout' || isPanning) return;
    if (layoutZoom.scale === 1) {
      layoutZoom.scale = 2;
      const rect = layoutVp.getBoundingClientRect();
      const cx = e.clientX - rect.left - rect.width / 2;
      const cy = e.clientY - rect.top - rect.height / 2;
      layoutZoom.pan = { x: -cx * 0.5, y: -cy * 0.5 };
    } else {
      layoutZoom.scale = 1;
      layoutZoom.pan = { x: 0, y: 0 };
    }
    applyZoom();
  });

  setupPan(layoutVp, layoutZoom);

  // Original viewport zoom
  const origVp = document.getElementById('originalViewport');
  origVp.addEventListener('wheel', (e) => {
    if (currentView !== 'original') return;
    e.preventDefault();
    const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
    originalZoom.scale = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, originalZoom.scale + delta));
    if (originalZoom.scale <= 1) originalZoom.pan = { x: 0, y: 0 };
    applyZoom();
  }, { passive: false });

  origVp.addEventListener('click', (e) => {
    if (currentView !== 'original' || isPanning) return;
    if (originalZoom.scale === 1) {
      originalZoom.scale = 2;
      const rect = origVp.getBoundingClientRect();
      const cx = e.clientX - rect.left - rect.width / 2;
      const cy = e.clientY - rect.top - rect.height / 2;
      originalZoom.pan = { x: -cx * 0.5, y: -cy * 0.5 };
    } else {
      originalZoom.scale = 1;
      originalZoom.pan = { x: 0, y: 0 };
    }
    applyZoom();
  });

  setupPan(origVp, originalZoom);
}

function setupPan(viewport, zoomState) {
  let dragStarted = false;
  viewport.addEventListener('mousedown', (e) => {
    if (zoomState.scale <= 1) return;
    isPanning = false;
    dragStarted = true;
    panStart = { x: e.clientX - zoomState.pan.x, y: e.clientY - zoomState.pan.y };
    viewport.style.cursor = 'grabbing';
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragStarted) return;
    isPanning = true;
    zoomState.pan = { x: e.clientX - panStart.x, y: e.clientY - panStart.y };
    applyZoom();
  });
  window.addEventListener('mouseup', () => {
    if (dragStarted) {
      dragStarted = false;
      viewport.style.cursor = zoomState.scale > 1 ? 'grab' : 'default';
      setTimeout(() => { isPanning = false; }, 50);
    }
  });
}

// ===== Text Resolution =====
function resolveTextForSpread(spread) {
  const sid = spread.spread_id;

  // Priority 1: Revised draft
  if (revisedDrafts?.[sid]?.text) {
    return {
      source: 'revised',
      option: buildSyntheticOption(spread, revisedDrafts[sid].text),
      sourceLabel: '&#9998; Revised Draft'
    };
  }

  // Priority 2: APS-selected option
  const apsReview = reviewData?.[sid];
  if (apsReview?.selected_text) {
    const opt = spread.text_options.find(o => o.option_id === apsReview.selected_text);
    if (opt) {
      return {
        source: 'aps-selected',
        option: opt,
        sourceLabel: `APS Selected: ${opt.option_id.toUpperCase()}`
      };
    }
  }

  // Priority 3: First text option
  if (spread.text_options.length > 0) {
    return {
      source: 'default',
      option: spread.text_options[0],
      sourceLabel: `Default: ${spread.text_options[0].option_id.toUpperCase()}`
    };
  }

  return { source: 'none', option: null, sourceLabel: 'No text available' };
}

function buildSyntheticOption(spread, revisedText) {
  // Find the base option to inherit display/caption from
  const apsReview = reviewData?.[spread.spread_id];
  let baseOpt = null;
  if (apsReview?.selected_text) {
    baseOpt = spread.text_options.find(o => o.option_id === apsReview.selected_text);
  }
  if (!baseOpt && spread.text_options.length > 0) {
    baseOpt = spread.text_options[0];
  }

  // Check for caption override in revised drafts
  const draft = revisedDrafts?.[spread.spread_id];
  const captionText = draft?.caption ?? baseOpt?.caption_text ?? '';

  return {
    option_id: 'revised',
    label: 'Revised Draft',
    display_text: baseOpt?.display_text || '',
    body_text: revisedText,
    caption_text: captionText,
    quotations_used: baseOpt?.quotations_used || [],
    word_count: revisedText.split(/\s+/).length
  };
}

// ===== Render Spread =====
function renderSpread(idx) {
  currentIndex = idx;
  const spread = data.spreads[idx];
  const sid = spread.spread_id;

  // Header
  document.getElementById('spreadSelect').value = idx;
  document.getElementById('spreadLabel').textContent = sid;
  document.getElementById('prevBtn').disabled = (idx === 0);
  document.getElementById('nextBtn').disabled = (idx === data.spreads.length - 1);

  const badge = document.getElementById('movementBadge');
  const movementMap = {
    'prologue': ['Prologue', ''],
    'movement_1_environment': ['M1: Environment', ' m1'],
    'movement_2_acceleration': ['M2: Acceleration', ' m2'],
    'hinge': ['The Hinge', ' hinge'],
    'movement_3_dreamscape': ['M3: Dreamscape', ' m3']
  };
  const [mName, mClass] = movementMap[spread.movement] || [spread.movement, ''];
  badge.textContent = mName;
  badge.className = 'movement-badge' + mClass;

  document.getElementById('themeText').textContent = spread.theme || '';

  // Original image
  document.getElementById('originalImage').src = `images/${sid}.jpg`;

  // Resolve which text to render
  const resolved = resolveTextForSpread(spread);

  // Image strip
  populateImageStrip(sid);

  // Render the layout
  if (resolved.option) {
    renderSpreadLayout(spread, resolved.option);
  }

  // Build info panel
  buildInfoPanel(spread, resolved);

  // Notes
  document.getElementById('reviewNotes').value = reviewNotes[sid] || '';

  // Reset zoom
  layoutZoom = { scale: 1, pan: { x: 0, y: 0 } };
  originalZoom = { scale: 1, pan: { x: 0, y: 0 } };
  applyZoom();

  // Progress
  updateProgressDots();
  updateProgressText();
}

// ===== Build Info Panel =====
function buildInfoPanel(spread, resolved) {
  const sid = spread.spread_id;
  const spec = spread.design_specs?.[0];
  const apsReview = reviewData?.[sid] || null;
  let html = '';

  // Text source badge
  const badgeClass = resolved.source === 'revised' ? 'revised' :
                     resolved.source === 'aps-selected' ? 'aps-selected' : 'default';
  html += `<div><span class="source-badge ${badgeClass}">${resolved.sourceLabel}</span></div>`;

  // Layout info badges
  if (spec) {
    html += `<div class="info-section-label">Layout</div>`;
    html += `<div class="layout-badges">`;
    if (spec.layout?.type) html += `<span class="layout-badge type">${spec.layout.type.replace(/_/g, ' ')}</span>`;
    if (spec.tone) html += `<span class="layout-badge tone">${spec.tone}</span>`;
    if (spec.typography?.color_treatment) html += `<span class="layout-badge color">${spec.typography.color_treatment.replace(/_/g, ' ')}</span>`;
    if (spec.typography?.display_scale) html += `<span class="layout-badge">${spec.typography.display_scale}</span>`;
    if (spec.density) html += `<span class="layout-badge">${spec.density}</span>`;
    html += `</div>`;
  }

  // APS quality ratings
  if (apsReview?.quality_ratings && Object.keys(apsReview.quality_ratings).length > 0) {
    html += `<div class="info-section-label">APS Ratings</div>`;
    html += `<div class="aps-ratings">`;
    for (const [optId, rating] of Object.entries(apsReview.quality_ratings)) {
      html += `<span class="aps-rating-item">`;
      html += `<span class="option-letter">${optId.toUpperCase()}</span>`;
      html += `<span class="stars">${'&#9733;'.repeat(rating)}</span>`;
      html += `</span>`;
    }
    html += `</div>`;
  }

  // Text preview
  if (resolved.option) {
    html += `<div class="info-section-label">Text Content</div>`;
    html += `<div class="text-preview-panel">`;
    if (resolved.option.display_text) {
      html += `<div class="text-preview-content"><div class="display-line">${esc(resolved.option.display_text)}</div></div>`;
    }
    if (resolved.option.body_text) {
      html += `<div class="text-preview-content" style="margin-top:8px;">${esc(resolved.option.body_text)}</div>`;
    }
    if (resolved.option.caption_text) {
      html += `<div class="text-preview-content" style="margin-top:6px;font-style:italic;color:var(--text-muted);">${esc(resolved.option.caption_text)}</div>`;
    }
    html += `</div>`;
  }

  // APS reviewer notes
  if (apsReview?.reviewer_notes) {
    html += `<div class="info-section-label">APS Review Notes</div>`;
    html += `<div class="aps-notes">`;
    html += `<div class="aps-notes-header"><span class="aps-badge">APS</span> Draft 1 Review</div>`;
    html += `<div class="aps-notes-body">${esc(apsReview.reviewer_notes)}</div>`;
    html += `</div>`;
  }

  document.getElementById('infoScroll').innerHTML = html;
}

// ===== Image Strip =====
function populateImageStrip(sid) {
  const strip = document.getElementById('imageStrip');
  const thumbs = document.getElementById('imageStripThumbs');
  const meta = imageMetadata?.[sid];
  if (!meta || meta.skipped || !meta.options?.length) {
    strip.style.display = 'none';
    currentImageIdx = 0;
    return;
  }

  currentImageIdx = meta.selected ?? 0;
  if (currentImageIdx >= meta.options.length) currentImageIdx = 0;

  strip.style.display = 'flex';
  let html = '';
  meta.options.forEach((opt, i) => {
    const active = (i === currentImageIdx) ? ' active' : '';
    html += `<div class="image-thumb${active}" onclick="selectImage('${sid}', ${i})" title="Option ${i+1}: ${opt.source || 'image'}">`;
    html += `<img src="images/${opt.file}" alt="Option ${i+1}" onerror="this.parentElement.innerHTML='<span class=no-img>?</span>'" />`;
    html += `</div>`;
  });
  thumbs.innerHTML = html;
}

function selectImage(sid, idx) {
  currentImageIdx = idx;
  populateImageStrip(sid);
  const spread = data.spreads[currentIndex];
  const resolved = resolveTextForSpread(spread);
  if (resolved.option) {
    renderSpreadLayout(spread, resolved.option);
  }
}

// ===== Render Spread Layout =====
// Modified to accept an option object directly (not just an option ID)
function renderSpreadLayout(spread, optionOrId) {
  const opt = typeof optionOrId === 'object' ? optionOrId :
    spread.text_options.find(o => o.option_id === optionOrId);
  if (!opt) return;

  const spec = spread.design_specs?.[0];
  const layoutType = spec?.layout?.type || 'split_asymmetric';
  const tone = spec?.tone || 'light';
  const colorTreatment = spec?.typography?.color_treatment || 'black_on_white';
  const displayScale = spec?.typography?.display_scale || 'large';
  const gutterTreatment = spec?.layout?.gutter_treatment || 'visible';
  const imageApproach = spec?.image_direction?.approach || 'none';

  const frame = document.getElementById('spreadFrame');

  // Reset
  frame.className = 'spread-frame';
  frame.innerHTML = `
    <div class="gutter-line" id="gutterLine"></div>
    <div class="spread-page left" id="pageLeft"></div>
    <div class="spread-page right" id="pageRight"></div>
  `;
  const left = document.getElementById('pageLeft');
  const right = document.getElementById('pageRight');
  const gutter = document.getElementById('gutterLine');

  // Tone
  if (tone === 'dark') frame.classList.add('tone-dark');
  else if (tone === 'mixed') frame.classList.add('tone-mixed');
  else if (tone === 'high_contrast') frame.classList.add('tone-high_contrast');
  else if (tone === 'balanced') frame.classList.add('tone-balanced');

  frame.classList.add(`layout-${layoutType}`);
  if (colorTreatment === 'reversed') frame.classList.add('color-reversed');
  gutter.className = 'gutter-line ' + gutterTreatment;

  // Build text elements
  const displayEl = opt.display_text ? buildDisplayText(opt.display_text, displayScale, colorTreatment, tone) : '';
  const bodyEl = opt.body_text ? buildBodyText(opt.body_text, colorTreatment, tone) : '';
  const captionEl = opt.caption_text ? buildCaptionText(opt.caption_text, colorTreatment, tone) : '';

  let quoteEl = '';
  if (opt.quotations_used?.length > 0) {
    const q = opt.quotations_used[0];
    quoteEl = buildQuotationText(q.text, q.attribution, q.source, colorTreatment, tone);
  }

  const sid = spread.spread_id;
  const imageSubject = spec?.image_direction?.subject || 'image';

  const needsImage = ['full_bleed_image', 'split_asymmetric', 'split_symmetric',
    'text_dominant', 'image_dominant', 'text_over_image', 'dense_collage', 'text_with_specific_image',
    'diagram_with_text'].includes(layoutType)
    && imageApproach !== 'typography_only' && imageApproach !== 'none';

  const hasImageForTypography = layoutType === 'full_bleed_typography'
    && imageApproach !== 'typography_only' && imageApproach !== 'none'
    && getImageUrl(sid);

  const imgEl = needsImage ? buildImageElement(sid, imageSubject) : '';

  // Layout-specific rendering
  switch (layoutType) {
    case 'full_bleed_typography': {
      const fbtBgUrl = hasImageForTypography ? getImageUrl(sid) : null;
      const fbtBgLayer = fbtBgUrl ? `<div style="position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;">
        <img src="${fbtBgUrl}" alt="${esc(imageSubject)}" style="width:100%;height:100%;object-fit:cover;opacity:0.3;" onerror="this.style.display='none'" />
      </div>` : '';
      const fbtColor = fbtBgUrl ? 'white_on_black' : colorTreatment;
      const fbtTone = fbtBgUrl ? 'dark' : tone;
      if (opt.display_text) {
        const words = opt.display_text.split(/\s+/);
        if (words.length <= 2) {
          frame.innerHTML = `
            <div class="gutter-line ${gutterTreatment}" id="gutterLine"></div>
            ${fbtBgLayer}
            ${fbtBgUrl ? '<div style="position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);"></div>' : ''}
            <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:space-between;padding:60px;">
              <div style="flex:1;display:flex;align-items:center;justify-content:center;">
                ${buildDisplayText(opt.display_text, displayScale, fbtColor, fbtTone)}
              </div>
              ${(bodyEl || captionEl) ? `<div style="max-width:50%;align-self:flex-end;text-align:right;">
                ${fbtBgUrl ? buildBodyText(opt.body_text || '', fbtColor, fbtTone) : (bodyEl || '')}
                ${opt.caption_text ? `<div style="margin-top:12px">${fbtBgUrl ? buildCaptionText(opt.caption_text, fbtColor, fbtTone) : captionEl}</div>` : ''}
              </div>` : ''}
            </div>
          `;
        } else {
          const mid = Math.ceil(words.length / 2);
          const leftWords = words.slice(0, mid).join(' ');
          const rightWords = words.slice(mid).join(' ');
          if (fbtBgUrl) {
            frame.innerHTML = `
              <div class="gutter-line ${gutterTreatment}" id="gutterLine"></div>
              ${fbtBgLayer}
              <div style="position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);"></div>
              <div style="position:absolute;top:0;left:0;width:50%;bottom:0;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;word-break:break-all;overflow-wrap:break-word;">
                ${buildDisplayText(leftWords, displayScale, fbtColor, fbtTone)}
              </div>
              <div style="position:absolute;top:0;right:0;width:50%;bottom:0;display:flex;flex-direction:column;justify-content:space-between;padding:20px;overflow:hidden;word-break:break-all;overflow-wrap:break-word;">
                <div style="flex:1;display:flex;align-items:center;justify-content:center;word-break:break-all;overflow-wrap:break-word;">
                  ${buildDisplayText(rightWords, displayScale, fbtColor, fbtTone)}
                </div>
                ${(opt.body_text || opt.caption_text) ? `<div style="text-align:right;padding:20px 20px 0;">
                  ${opt.body_text ? buildBodyText(opt.body_text, fbtColor, fbtTone) : ''}
                  ${opt.caption_text ? `<div style="margin-top:8px">${buildCaptionText(opt.caption_text, fbtColor, fbtTone)}</div>` : ''}
                </div>` : ''}
              </div>
            `;
          } else {
            left.style.cssText = 'display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;word-break:break-all;overflow-wrap:break-word;';
            left.innerHTML = buildDisplayText(leftWords, displayScale, colorTreatment, tone);
            right.style.cssText = 'display:flex;flex-direction:column;justify-content:space-between;padding:20px;overflow:hidden;word-break:break-all;overflow-wrap:break-word;';
            right.innerHTML = `
              <div style="flex:1;display:flex;align-items:center;justify-content:center;word-break:break-all;overflow-wrap:break-word;">
                ${buildDisplayText(rightWords, displayScale, colorTreatment, tone)}
              </div>
              ${(bodyEl || captionEl) ? `<div style="text-align:right;padding:20px 20px 0;">
                ${bodyEl || ''}
                ${captionEl ? `<div style="margin-top:8px">${captionEl}</div>` : ''}
              </div>` : ''}
            `;
          }
        }
      } else {
        if (fbtBgUrl) {
          frame.innerHTML = `
            <div class="gutter-line ${gutterTreatment}" id="gutterLine"></div>
            ${fbtBgLayer}
            <div style="position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);"></div>
            <div style="position:absolute;top:0;left:0;width:50%;bottom:0;display:flex;align-items:center;justify-content:center;height:100%;padding:60px">
              ${opt.body_text ? buildBodyText(opt.body_text, fbtColor, fbtTone) : ''}
            </div>
            <div style="position:absolute;top:0;right:0;width:50%;bottom:0;display:flex;align-items:flex-end;justify-content:flex-end;height:100%;padding:60px">
              ${opt.caption_text ? buildCaptionText(opt.caption_text, fbtColor, fbtTone) : ''}
            </div>
          `;
        } else {
          left.innerHTML = bodyEl ? `<div style="display:flex;align-items:center;justify-content:center;height:100%;padding:60px">${bodyEl}</div>` : '';
          right.innerHTML = captionEl ? `<div style="display:flex;align-items:flex-end;justify-content:flex-end;height:100%;padding:60px">${captionEl}</div>` : '';
        }
      }
      break;
    }

    case 'full_bleed_image': {
      const fullBleedUrl = getImageUrl(sid);
      const fullBleedBg = fullBleedUrl
        ? `<img src="${fullBleedUrl}" alt="${esc(imageSubject)}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;" onerror="this.outerHTML='<div class=image-placeholder style=height:100%>${esc(imageSubject)}</div>'" />`
        : `<div class="image-placeholder" style="height:100%">${esc(imageSubject)}</div>`;
      const fbiHasText = opt.display_text || opt.body_text || opt.caption_text;
      frame.innerHTML = `
        <div class="gutter-line ${gutterTreatment}" id="gutterLine"></div>
        <div style="position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;">${fullBleedBg}</div>
        ${fbiHasText ? `<div class="text-overlay" style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:flex-end;padding:60px 50px;background:linear-gradient(transparent 40%, rgba(0,0,0,0.65));">
          ${opt.display_text ? `<div class="display-zone">${buildDisplayText(opt.display_text, displayScale, 'white_on_black', 'dark')}</div>` : ''}
          ${opt.body_text ? `<div class="body-zone" style="color:rgba(255,255,255,0.9);margin-top:16px">${buildBodyText(opt.body_text, 'white_on_black', 'dark')}</div>` : ''}
          ${opt.caption_text ? `<div class="caption-zone" style="color:rgba(255,255,255,0.7);margin-top:12px">${buildCaptionText(opt.caption_text, 'white_on_black', 'dark')}</div>` : ''}
        </div>` : ''}
      `;
      break;
    }

    case 'split_asymmetric':
      left.style.cssText = 'display:flex;flex-direction:column;justify-content:center;padding:50px 40px;overflow:hidden;';
      left.innerHTML = `${displayEl}${bodyEl ? `<div style="margin-top:24px">${bodyEl}</div>` : ''}${captionEl ? `<div style="margin-top:16px">${captionEl}</div>` : ''}${quoteEl ? `<div style="margin-top:20px">${quoteEl}</div>` : ''}`;
      right.innerHTML = imgEl || `<div style="display:flex;align-items:center;justify-content:center;height:100%;padding:40px">${quoteEl || displayEl}</div>`;
      break;

    case 'split_symmetric':
      left.style.cssText = 'display:flex;flex-direction:column;justify-content:center;padding:50px 40px;';
      left.innerHTML = `${displayEl}${bodyEl ? `<div style="margin-top:20px">${bodyEl}</div>` : ''}${captionEl ? `<div style="margin-top:12px">${captionEl}</div>` : ''}`;
      right.innerHTML = imgEl || `<div style="display:flex;align-items:center;justify-content:center;height:100%;padding:40px">${quoteEl || ''}</div>`;
      break;

    case 'text_dominant':
      left.style.cssText = 'display:flex;flex-direction:column;justify-content:center;padding:50px 40px;';
      left.innerHTML = `${displayEl}${bodyEl ? `<div style="margin-top:20px">${bodyEl}</div>` : ''}`;
      right.style.cssText = 'display:flex;flex-direction:column;justify-content:space-between;padding:40px;';
      right.innerHTML = `<div style="flex:1;display:flex;flex-direction:column;justify-content:center;">${quoteEl || ''}${captionEl ? `<div style="margin-top:16px">${captionEl}</div>` : ''}</div>${needsImage ? buildImageElement(sid, imageSubject, 'height:35%;margin-top:20px;border-radius:2px;overflow:hidden;flex-shrink:0;') : ''}`;
      break;

    case 'image_dominant': {
      const idUrl = getImageUrl(sid);
      const idBg = idUrl
        ? `<img src="${idUrl}" alt="${esc(imageSubject)}" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;" onerror="this.outerHTML='<div class=image-placeholder style=position:absolute;top:0;left:0;width:100%;height:100%>${esc(imageSubject)}</div>'" />`
        : `<div class="image-placeholder" style="position:absolute;top:0;left:0;width:100%;height:100%">${esc(imageSubject)}</div>`;
      const idHasText = opt.display_text || opt.body_text || opt.caption_text || (opt.quotations_used?.length > 0);
      if (idHasText) {
        const idDisplay = opt.display_text ? buildDisplayText(opt.display_text, displayScale, 'white_on_black', 'dark') : '';
        const idBody = opt.body_text ? buildBodyText(opt.body_text, 'white_on_black', 'dark') : '';
        const idCaption = opt.caption_text ? buildCaptionText(opt.caption_text, 'white_on_black', 'dark') : '';
        let idQuote = '';
        if (opt.quotations_used?.length > 0) {
          const q = opt.quotations_used[0];
          idQuote = buildQuotationText(q.text, q.attribution, q.source, 'white_on_black', 'dark');
        }
        frame.innerHTML = `
          <div class="gutter-line ${gutterTreatment}" id="gutterLine"></div>
          <div style="position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;">${idBg}</div>
          <div style="position:absolute;top:0;right:0;width:50%;bottom:0;display:flex;flex-direction:column;justify-content:center;padding:50px 40px;background:linear-gradient(to right, transparent, rgba(0,0,0,0.7) 30%);overflow:hidden;">
            ${idDisplay}${idBody ? `<div style="margin-top:20px">${idBody}</div>` : ''}${idCaption ? `<div style="margin-top:16px">${idCaption}</div>` : ''}${idQuote ? `<div style="margin-top:20px">${idQuote}</div>` : ''}
          </div>
        `;
      } else {
        frame.innerHTML = `
          <div class="gutter-line ${gutterTreatment}" id="gutterLine"></div>
          <div style="position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;">${idBg}</div>
        `;
      }
      break;
    }

    case 'text_over_image':
      const toiUrl = getImageUrl(sid);
      const toiBg = toiUrl
        ? `<img src="${toiUrl}" alt="${esc(imageSubject)}" style="width:100%;height:100%;object-fit:cover;" onerror="this.outerHTML='<div class=image-placeholder style=height:100%>${esc(imageSubject)}</div>'" />`
        : `<div class="image-placeholder" style="height:100%">${esc(imageSubject)}</div>`;
      frame.innerHTML = `
        <div class="gutter-line ${gutterTreatment}" id="gutterLine"></div>
        <div style="position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;">${toiBg}</div>
        <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:80px;text-align:center;background:rgba(0,0,0,0.3);">
          ${buildDisplayText(opt.display_text || '', displayScale, 'white_on_black', 'dark')}
          ${opt.body_text ? `<div style="margin-top:24px;max-width:600px">${buildBodyText(opt.body_text, 'white_on_black', 'dark')}</div>` : ''}
          ${opt.caption_text ? `<div style="margin-top:16px">${buildCaptionText(opt.caption_text, 'white_on_black', 'dark')}</div>` : ''}
        </div>
      `;
      break;

    case 'minimal_sparse':
      left.style.cssText = 'display:flex;align-items:center;justify-content:center;padding:80px 60px;';
      left.innerHTML = displayEl;
      right.style.cssText = 'display:flex;flex-direction:column;justify-content:flex-end;padding:80px 60px;';
      right.innerHTML = `${bodyEl || ''}${captionEl ? `<div style="margin-top:20px">${captionEl}</div>` : ''}${quoteEl ? `<div style="margin-top:24px">${quoteEl}</div>` : ''}`;
      break;

    case 'dense_collage':
      left.style.cssText = 'position:relative;overflow:hidden;';
      left.innerHTML = `${needsImage ? `<div style="position:absolute;top:10%;left:5%;width:80%;height:60%;">${buildImageElement(sid, imageSubject, 'height:100%')}</div>` : ''}<div style="position:absolute;bottom:10%;left:10%;right:10%;">${displayEl}</div>`;
      right.style.cssText = 'position:relative;overflow:hidden;padding:30px;display:flex;flex-direction:column;justify-content:center;';
      right.innerHTML = `${bodyEl || ''}${quoteEl ? `<div style="margin-top:20px">${quoteEl}</div>` : ''}${captionEl ? `<div style="margin-top:16px">${captionEl}</div>` : ''}`;
      break;

    case 'diagram_with_text': {
      const leftHasCaption = (!displayEl && !bodyEl && captionEl);
      left.style.cssText = 'display:flex;flex-direction:column;justify-content:center;padding:40px;overflow:hidden;';
      left.innerHTML = `${displayEl || ''}${bodyEl ? `<div style="margin-top:${displayEl ? '20px' : '0'}">${bodyEl}</div>` : ''}${leftHasCaption ? captionEl : ''}${captionEl && !leftHasCaption ? `<div style="margin-top:16px">${captionEl}</div>` : ''}${quoteEl ? `<div style="margin-top:20px">${quoteEl}</div>` : ''}`;
      right.style.cssText = 'display:flex;align-items:center;justify-content:center;padding:40px;';
      if (needsImage) {
        right.innerHTML = `<div style="width:100%;height:80%;">${buildImageElement(sid, imageSubject, 'height:100%')}</div>`;
      } else {
        right.innerHTML = `<div class="image-placeholder" style="width:80%;height:60%;display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0.4;">diagram / data visualization</div>`;
      }
      break;
    }

    case 'text_with_specific_image':
      left.style.cssText = 'display:flex;flex-direction:column;justify-content:center;padding:50px 40px;';
      left.innerHTML = `${displayEl}${bodyEl ? `<div style="margin-top:20px">${bodyEl}</div>` : ''}${captionEl ? `<div style="margin-top:16px">${captionEl}</div>` : ''}`;
      right.innerHTML = imgEl || `<div style="display:flex;align-items:center;justify-content:center;height:100%;padding:40px">${quoteEl || displayEl}</div>`;
      break;

    default:
      left.style.cssText = 'display:flex;flex-direction:column;justify-content:center;padding:50px 40px;';
      left.innerHTML = `${displayEl}${bodyEl ? `<div style="margin-top:20px">${bodyEl}</div>` : ''}`;
      right.style.cssText = 'display:flex;flex-direction:column;justify-content:center;padding:50px 40px;';
      right.innerHTML = `${captionEl || ''}${quoteEl ? `<div style="margin-top:16px">${quoteEl}</div>` : ''}`;
  }

  scaleSpread();
}

// ===== Image URL & Element Builders =====
function getImageUrl(sid) {
  // Check for image override in revised drafts
  const draft = revisedDrafts?.[sid];
  if (draft?.image) return `images/${draft.image}`;

  const meta = imageMetadata?.[sid];
  if (!meta || meta.skipped || !meta.options?.length) return null;
  const idx = currentImageIdx < meta.options.length ? currentImageIdx : 0;
  return `images/${meta.options[idx].file}`;
}

function buildImageElement(sid, subject, style) {
  const url = getImageUrl(sid);
  if (url) {
    return `<div class="image-zone" ${style ? `style="${style}"` : ''}>
      <img src="${url}" alt="${esc(subject || 'spread image')}" style="width:100%;height:100%;object-fit:cover;" onerror="this.outerHTML='<div class=image-placeholder>${esc(subject || 'image')}</div>'" />
    </div>`;
  }
  return `<div class="image-zone" ${style ? `style="${style}"` : ''}><div class="image-placeholder">${esc(subject || 'image')}</div></div>`;
}

// ===== Typography Builders =====
function buildDisplayText(text, scale, color, tone) {
  if (!text) return '';
  const trimmed = text.trim();
  const scaleClass = (trimmed.length === 1 && (scale === 'architectural' || scale === 'monumental'))
    ? 'scale-monumental-single' : `scale-${scale || 'large'}`;
  const colorStyle = getTextColor(color, tone, 'display');
  return `<div class="spread-display-text ${scaleClass}" style="${colorStyle}">${esc(text)}</div>`;
}

function buildBodyText(text, color, tone) {
  if (!text) return '';
  const colorStyle = getTextColor(color, tone, 'body');
  return `<div class="spread-body-text" style="${colorStyle};white-space:pre-line">${esc(text)}</div>`;
}

function buildCaptionText(text, color, tone) {
  if (!text) return '';
  const colorStyle = getTextColor(color, tone, 'caption');
  return `<div class="spread-caption-text" style="${colorStyle}">${esc(text)}</div>`;
}

function buildQuotationText(text, attr, source, color, tone) {
  const colorStyle = getTextColor(color, tone, 'body');
  let html = `<div style="border-left:3px solid ${tone === 'dark' ? '#555' : '#ccc'};padding-left:16px;">`;
  html += `<div class="spread-quotation-text" style="${colorStyle}">"${esc(text)}"</div>`;
  html += `<div class="spread-caption-text" style="margin-top:6px;${colorStyle}">— ${esc(attr)}`;
  if (source) html += `, <em>${esc(source)}</em>`;
  html += `</div></div>`;
  return html;
}

function getTextColor(colorTreatment, tone, role) {
  const darkBg = (tone === 'dark' || tone === 'high_contrast');
  const lightBg = (tone === 'light' || tone === 'balanced');
  if (colorTreatment === 'white_on_black' || colorTreatment === 'reversed' || darkBg) {
    if (role === 'display') return 'color:#fff';
    if (role === 'body') return 'color:rgba(255,255,255,0.88)';
    return 'color:rgba(255,255,255,0.65)';
  }
  if (colorTreatment === 'black_on_white' || lightBg) {
    if (role === 'display') return 'color:#000';
    if (role === 'body') return 'color:rgba(0,0,0,0.78)';
    return 'color:rgba(0,0,0,0.55)';
  }
  if (role === 'display') return 'color:#111';
  if (role === 'body') return 'color:rgba(0,0,0,0.75)';
  return 'color:rgba(0,0,0,0.5)';
}

// ===== Scale spread to fit viewport =====
function scaleSpread() {
  const viewport = document.getElementById('layoutViewport');
  const wrapper = document.getElementById('spreadScaleWrapper');
  if (!viewport || !wrapper) return;

  const vw = viewport.clientWidth - 32;
  const vh = viewport.clientHeight - 32;
  const sw = 1060;
  const sh = 905;
  const baseScale = Math.min(vw / sw, vh / sh, 1);
  const finalScale = baseScale * layoutZoom.scale;
  wrapper.style.transform = `translate(${layoutZoom.pan.x}px, ${layoutZoom.pan.y}px) scale(${finalScale})`;
  viewport.style.cursor = layoutZoom.scale > 1 ? 'grab' : 'default';
}

function scaleCurrentView() {
  if (currentView === 'layout') scaleSpread();
}

// ===== Notes =====
function saveNote() {
  const sid = data.spreads[currentIndex].spread_id;
  const note = document.getElementById('reviewNotes').value.trim();
  if (note) {
    reviewNotes[sid] = note;
  } else {
    delete reviewNotes[sid];
  }
  localStorage.setItem('review_notes_v1', JSON.stringify(reviewNotes));
  updateProgressDots();
  updateProgressText();
}

function updateProgressDots() {
  data.spreads.forEach((s, i) => {
    const dot = document.querySelector(`.progress-dot[data-idx="${i}"]`);
    if (dot) {
      let cls = 'progress-dot';
      if (i === currentIndex) cls += ' current';
      else if (revisedDrafts?.[s.spread_id]?.text) cls += ' has-draft';
      else if (reviewNotes[s.spread_id]) cls += ' has-notes';
      dot.className = cls;
    }
  });
}

// ===== Export =====
function exportReviewNotes() {
  const output = {
    version: "1.0",
    type: "layout_review",
    exported: new Date().toISOString(),
    total_spreads: data.spreads.length,
    notes: {}
  };
  data.spreads.forEach(s => {
    const sid = s.spread_id;
    const resolved = resolveTextForSpread(s);
    const note = reviewNotes[sid] || null;
    const apsReview = reviewData?.[sid] || null;
    if (note || resolved.source !== 'default') {
      output.notes[sid] = {
        text_source: resolved.source,
        text_option: resolved.source === 'aps-selected' ? resolved.option?.option_id : null,
        has_revised_draft: !!revisedDrafts?.[sid]?.text,
        aps_notes: apsReview?.reviewer_notes || null,
        review_note: note
      };
    }
  });
  const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `layout_review_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== Helpers =====
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function truncate(str, n) {
  return str.length > n ? str.slice(0, n) + '...' : str;
}

// ===== Keyboard Navigation =====
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  // Toggle view with Tab key
  if (e.key === 'Tab') {
    e.preventDefault();
    switchView(currentView === 'layout' ? 'original' : 'layout');
  }
  // Zoom shortcuts
  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
  if (e.key === '0') zoomReset();
  // Image cycling
  const sid = data?.spreads[currentIndex]?.spread_id;
  if (!sid) return;
  if (e.key === '[' || e.key === ']') {
    const meta = imageMetadata?.[sid];
    if (meta && !meta.skipped && meta.options?.length > 1) {
      let newIdx = currentImageIdx + (e.key === ']' ? 1 : -1);
      if (newIdx < 0) newIdx = meta.options.length - 1;
      if (newIdx >= meta.options.length) newIdx = 0;
      selectImage(sid, newIdx);
    }
  }
});

// ===== Init =====
init();
</script>
